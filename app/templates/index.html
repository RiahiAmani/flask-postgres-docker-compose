{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h2 class="text-center mb-3">📝 My Tasks</h2>
  <form class="d-flex mb-3" action="{{ url_for('main.add') }}" method="POST">
    <input type="text" name="title" class="form-control me-2" placeholder="Add a new task..." required>
    <button class="btn btn-primary">Add</button>
  </form>

  <ul class="list-group">
    {% for task in tasks %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span class="{% if task.completed %}completed{% endif %}">{{ task.title }}</span>
        <div>
          <a href="{{ url_for('main.complete', id=task.id) }}" class="btn btn-sm btn-success">✓</a>
          <a href="{{ url_for('main.delete', id=task.id) }}" class="btn btn-sm btn-danger">✗</a>
        </div>
      </li>
    {% else %}
      <li class="list-group-item text-center text-muted">No tasks yet. Add one above!</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
