{% extends "base.html" %}
{% block content %}
<div class="card p-4" style="max-width: 400px; margin: auto;">
  <h2 class="text-center mb-3">Register</h2>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input class="form-control mb-2" type="text" name="username" placeholder="Username" required>
    <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>
    <button class="btn btn-primary w-100">Register</button>
  </form>
  <p class="mt-2 text-center">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}
